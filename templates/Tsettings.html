<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% load static %}

    <meta charset="UTF-8">
    <title>Task Manager</title>

    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon.png' %}">
<link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon.png' %}">



<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: #f1f5f9;
    font-family: 'Segoe UI', sans-serif;
}

/* Card */
.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

/* Heading */
h3 {
    color: #ffffff;
}

/* Labels */
label {
    color: #cbd5f5;
    font-weight: 500;
}

/* Select */
.form-select {
    background: #020617;
    color: #f8fafc;
    border: 1px solid #334155;
}

/* Select focus */
.form-select:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 1px #6366f1;
}

/* Checkbox */
.form-check {
    margin-bottom: 8px;
}

/* 🔥 FIX: Checkbox label visibility */
.form-check-label {
    color: #e2e8f0 !important;
    margin-left: 6px;
}

/* Checkbox input */
.form-check-input {
    background-color: #020617;
    border: 1px solid #475569;
}

/* Checked state */
.form-check-input:checked {
    background-color: #6366f1;
    border-color: #6366f1;
}

/* Button */
.btn-primary {
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-weight: 500;
}

.btn-primary:hover {
    background: linear-gradient(90deg, #4f46e5, #7c3aed);
}
</style>
</head>

<body>

<div class="container py-5">

    <div class="card mx-auto" style="max-width:600px;">

        <h3 class="mb-4 text-center">Task Settings ⚙️</h3>

        <form>

            <!-- Sorting -->
            <div class="mb-4">
                <label class="form-label">Sort Tasks By</label>
                <select class="form-select">
                    <option>Priority</option>
                    <option>Deadline</option>
                    <option>Created Date</option>
                    <option>Alphabetical</option>
                </select>
            </div>

            <!-- Order -->
            <div class="mb-4">
                <label class="form-label">Order</label>
                <select class="form-select">
                    <option>Ascending</option>
                    <option>Descending</option>
                </select>
            </div>

            <!-- Filters -->
            <div class="mb-4">
                <label class="form-label">Show Tasks</label><br>

                <input type="checkbox" class="form-check-input me-2"> Completed<br>
                <input type="checkbox" class="form-check-input me-2"> Pending<br>
                <input type="checkbox" class="form-check-input me-2"> High Priority
            </div>

            <button class="btn btn-primary w-100">Save Settings</button>

        </form>

    </div>

</div>

</body>
</html>
