<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% load static %}

    <meta charset="UTF-8">
    <title>Task Manager</title>

    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon.png' %}">
<link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon.png' %}">



<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: #f8fafc;
    font-family: 'Segoe UI', sans-serif;
}

/* Card */
.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Heading */
h3 {
    color: #ffffff;
    font-weight: 600;
}

/* Labels (🔥 FIXED VISIBILITY) */
label {
    color: #cbd5f5;
    font-weight: 500;
    margin-bottom: 6px;
}

/* Inputs */
.form-control,
.form-select {
    background: #020617;
    border: 1px solid #334155;
    color: #f1f5f9;
    border-radius: 8px;
}

/* Focus */
.form-control:focus,
.form-select:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 1px #6366f1;
    background: #020617;
    color: #ffffff;
}

/* Placeholder */
::placeholder {
    color: #64748b;
}

/* Date input icon fix */
input[type="date"] {
    color-scheme: dark;
}

/* Button */
.btn-primary {
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-weight: 500;
    transition: 0.3s;
}

.btn-primary:hover {
    background: linear-gradient(90deg, #4f46e5, #7c3aed);
}

/* Spacing */
.container {
    max-width: 600px;
}
    /* Description style */
.task-desc {
    color: #94a3b8;
    font-size: 0.9rem;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container py-5">

    <div class="card mx-auto" style="max-width:500px;">

        <h3 class="mb-4 text-center">Add New Task ➕</h3>

        <form method="POST">
            {% csrf_token %}

            <!-- Task Title -->
            <div class="mb-3">
                <label>Task Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter task..." required>
            </div>

<div class="mb-3">
    <label>Description</label>
    <textarea name="description" class="form-control" placeholder="Enter task details..." required></textarea>
</div>


            <!-- Category -->
            <div class="mb-3">
                <label>Category</label>
                <select name="category" class="form-select">
                    <option>Work</option>
                    <option>Study</option>
                    <option>Personal</option>
                    <option>Shopping</option>
                </select>
            </div>

            <!-- Deadline -->
            <div class="mb-3">
                <label>Deadline</label>
                <input type="date" name="deadline" class="form-control">
            </div>

            <!-- Priority -->
            <div class="mb-3">
                <label>Priority</label>
                <select name="priority" class="form-select">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                </select>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">
                Add Task
            </button>

        </form>

    </div>

</div>

</body>
</html>
